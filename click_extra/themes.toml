# Built-in palettes for click_extra.theme.HelpExtraTheme.
#
# Each [<name>] table maps to a HelpExtraTheme via HelpExtraTheme.from_dict.
# Slot values are inline tables matching Style.from_dict: { fg = "<color>",
# bold = true, ... }. Omitted slots default to identity (no styling).
#
# Themes are kept in alphabetical order; tests/test_themes.py enforces this.


[dark]
# Theme tuned for terminals with a dark background. Used as the process-wide
# click_extra.theme.default_theme.
invoked_command = { fg = "bright_white" }
heading = { fg = "bright_blue", bold = true, underline = true }
constraint = { fg = "magenta" }
alias = { fg = "cyan" }
alias_secondary = { fg = "cyan", dim = true }
critical = { fg = "red", bold = true }
error = { fg = "red" }
warning = { fg = "yellow" }
debug = { fg = "blue" }
option = { fg = "cyan" }
subcommand = { fg = "cyan" }
choice = { fg = "magenta" }
metavar = { fg = "cyan", dim = true }
bracket = { dim = true }
envvar = { fg = "yellow", dim = true }
default = { fg = "green", dim = true, italic = true }
range_label = { fg = "cyan", dim = true }
required = { fg = "red", dim = true }
argument = { fg = "cyan" }
deprecated = { fg = "bright_yellow", bold = true }
search = { fg = "green", bold = true }
success = { fg = "green" }
subheading = { fg = "blue" }


[dracula]
