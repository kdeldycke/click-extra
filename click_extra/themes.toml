# Palette: https://draculatheme.com/contribute
invoked_command = { fg = "#f8f8f2", bold = true }
heading = { fg = "#ff79c6", bold = true, underline = true }
constraint = { fg = "#ff79c6" }
alias = { fg = "#8be9fd" }
alias_secondary = { fg = "#8be9fd", dim = true }
critical = { fg = "#ff5555", bold = true }
error = { fg = "#ff5555" }
warning = { fg = "#ffb86c" }
debug = { fg = "#6272a4" }
option = { fg = "#bd93f9" }
subcommand = { fg = "#bd93f9" }
choice = { fg = "#ff79c6" }
metavar = { fg = "#bd93f9", dim = true }
bracket = { fg = "#6272a4" }
envvar = { fg = "#ffb86c", dim = true }
default = { fg = "#50fa7b", dim = true, italic = true }
range_label = { fg = "#bd93f9", dim = true }
required = { fg = "#ff5555", dim = true }
argument = { fg = "#bd93f9" }
deprecated = { fg = "#ffb86c", bold = true }
search = { fg = "#f1fa8c", bold = true }
success = { fg = "#50fa7b" }
