# This test plan checks some high-level behavior of the click-extra CLIs.
#
# click-extra is the wrapper CLI that applies help colorization to any Click CLI.
# click-extra-demo is the developer utility CLI with render-matrix and prebake.
#
# Version regex allows stable (1.2.3), dev (1.2.3.dev0), and prebaked
# (1.2.3.dev0+abc1234) versions.


# -- click-extra wrapper CLI ---------------------------------------------------


# Check the wrapper CLI reports its version on stdout.
- cli: click-extra
  cli_parameters: --version
  exit_code: 0
  stdout_contains: "Click Extra"
  stdout_regex_fullmatch: "Click Extra, version \
    [0-9]+\\.[0-9]+\\.[0-9]+(\\.[a-z]+[0-9]+\
    (\\+[0-9a-f]+)?)?\n"


# Test wrapper help output.
- cli: click-extra
  cli_parameters:
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra [OPTIONS] SCRIPT [ARGS]..."
    - "Apply Click Extra help colorization to any Click CLI."
    - "--color"
    - "--theme"
    - "Show the version and exit."
    - "Show this message and exit."


# -- click-extra-demo developer CLI --------------------------------------------


# Check the demo CLI reports its version on stdout.
- cli: click-extra-demo
  cli_parameters: --version
  exit_code: 0
  stdout_contains: "Click Extra"


# Test combination of version and verbosity.
- cli: click-extra-demo
  cli_parameters:
    - --verbosity
    - DEBUG
    - --version
  exit_code: 0
  stdout_contains: ", version"
  stderr_contains:
    - "Set <RootLogger root (DEBUG)> to DEBUG."


# Test demo help output. Use platform-independent assertions: only check parts
# of the help text that are the same across all OSes (the config default path
# varies, and column alignment depends on terminal width).
- cli: click-extra-demo
  cli_parameters:
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra [OPTIONS] COMMAND [ARGS]..."
    - "Show the version and exit."
    - "Show this message and exit."
