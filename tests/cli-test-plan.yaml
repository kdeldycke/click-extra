# This test plan checks some high-level behavior of the click-extra CLI.
#
# The prog_name shown in version output is "Click Extra demo" (set via version_fields
# in cli.py). The usage line shows "click-extra" (set via name= in the @group decorator).
# The version regex allows stable (1.2.3), dev (1.2.3.dev0), and prebaked
# (1.2.3.dev0+abc1234) versions.


# Check the CLI reports its version on stdout.
- cli_parameters: --version
  exit_code: 0
  stdout_contains: "Click Extra demo\x1b[0m, version \x1b[32m"
  stdout_regex_fullmatch: "\x1b\\[97mClick Extra demo\x1b\\[0m, version \
    \x1b\\[32m[0-9]+\\.[0-9]+\\.[0-9]+(\\.[a-z]+[0-9]+\
    (\\+[0-9a-f]+)?)?\x1b\\[0m\n"


# Test combination of version and verbosity.
- cli_parameters:
    - --verbosity
    - DEBUG
    - --version
  exit_code: 0
  stdout_contains: ", version"
  stderr_contains:
    - "Set <RootLogger root (DEBUG)> to DEBUG."


# Test help output. Use platform-independent assertions: only check parts of the
# help text that are the same across all OSes (the config default path varies,
# and column alignment depends on terminal width).
- cli_parameters:
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra [OPTIONS] COMMAND [ARGS]..."
    - "Show the version and exit."
    - "Show this message and exit."
