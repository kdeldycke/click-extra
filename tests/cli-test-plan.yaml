# This test plan checks some high-level behavior of the click-extra CLI.
#
# The CLI's prog_name is "demo" (from the @group-decorated function name in cli.py).
# The version regex allows stable (1.2.3), dev (1.2.3.dev0), and prebaked
# (1.2.3.dev0+abc1234) versions.


# Diagnostic: check if binary produces ANY output on stderr (no stdout assertion).
# This helps debug Nuitka onefile binaries where stdout may be empty.
- cli_parameters:
    - --verbosity
    - DEBUG
    - --version
  exit_code: 0
  stderr_regex_matches: "."


# Check the CLI reports its version on stdout.
- cli_parameters: --version
  exit_code: 0
  stdout_contains: "demo\x1b[0m, version \x1b[32m"
  stdout_regex_fullmatch: "\x1b\\[97mdemo\x1b\\[0m, version \x1b\\[32m[0-9]+\\.[0-9]+\\.[0-9]+(\\.[a-z]+[0-9]+(\\+[0-9a-f]+)?)?\x1b\\[0m\n"


# Test combination of version and verbosity.
- cli_parameters:
    - --verbosity
    - DEBUG
    - --version
  exit_code: 0
  stdout_contains: ", version"
  stderr_contains:
    - "Set <RootLogger root (DEBUG)> to DEBUG."


# Test help output. Use platform-independent assertions: only check parts of the
# help text that are the same across all OSes (the config default path varies,
# and column alignment depends on terminal width).
- cli_parameters:
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: demo [OPTIONS] COMMAND [ARGS]..."
    - "Show the version and exit."
    - "Show this message and exit."
