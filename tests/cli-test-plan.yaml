# This test plan checks some high-level behavior of the click-extra CLI.
#
# The prog_name shown in version output is "Click Extra" (set via version_fields
# in cli.py). The usage line shows "click-extra" (set via name= in the @group decorator).
# The version regex allows stable (1.2.3), dev (1.2.3.dev0), and prebaked
# (1.2.3.dev0+abc1234) versions.


# -- Group-level ---------------------------------------------------------------


# Check the CLI reports its version on stdout.
- cli_parameters: --version
  exit_code: 0
  stdout_contains: "Click Extra\x1b[0m, version \x1b[32m"
  stdout_regex_fullmatch: "\x1b\\[97mClick Extra\x1b\\[0m, version \
    \x1b\\[32m[0-9]+\\.[0-9]+\\.[0-9]+(\\.[a-z]+[0-9]+\
    (\\+[0-9a-f]+)?)?\x1b\\[0m\n"


# Test combination of version and verbosity.
- cli_parameters:
    - --verbosity
    - DEBUG
    - --version
  exit_code: 0
  stdout_contains: ", version"
  stderr_contains:
    - "Set <RootLogger root (DEBUG)> to DEBUG."


# Test help output. Check that all subcommands and sections are listed.
- cli_parameters:
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra [OPTIONS] COMMAND [ARGS]..."
    - "Show the version and exit."
    - "Show this message and exit."
    - "--theme"
    - "Demo:"
    - "8color"
    - "colors"
    - "gradient"
    - "palette"
    - "styles"
    - "help"
    - "prebake"
    - "run"


# -- help subcommand ----------------------------------------------------------


- cli_parameters:
    - help
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra help"
    - "Show help for a command."


# -- run subcommand -----------------------------------------------------------


- cli_parameters:
    - run
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra run [OPTIONS] SCRIPT [ARGS]..."
    - "Apply Click Extra help colorization to any Click CLI."


# -- prebake subcommand -------------------------------------------------------


- cli_parameters:
    - prebake
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Usage: click-extra prebake"
    - "Pre-bake build-time metadata"


- cli_parameters:
    - prebake
    - version
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Inject Git commit hash"


- cli_parameters:
    - prebake
    - field
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Replace an empty dunder variable"


- cli_parameters:
    - prebake
    - all
    - --help
  exit_code: 0
  strip_ansi: true
  stdout_contains:
    - "Pre-bake ``__version__`` and all git fields"


# -- demo subcommands ---------------------------------------------------------


- cli_parameters:
