# This test suite checks some high-level behavior of the click-extra CLI.
#
# The prog_name shown in version output is "Click Extra" (set via version_fields
# in cli.py). The usage line shows "click-extra" (set via name= in the @group decorator).
# The version regex allows stable (1.2.3), dev (1.2.3.dev0), and prebaked
# (1.2.3.dev0+abc1234) versions.


# -- Group-level ---------------------------------------------------------------


# Check the CLI reports its version on stdout.
[[cases]]
cli_parameters = "--version"
exit_code = 0
# click-extra 8.0's --color=auto strips color on captured (non-TTY)
# output, so the version line is plain text. strip_ansi stays robust.
strip_ansi = true
stdout_contains = "Click Extra, version "
stdout_regex_fullmatch = "Click Extra, version [0-9]+\\.[0-9]+\\.[0-9]+(\\.[a-z]+[0-9]+(\\+[0-9a-f]+)?)?\n"


# Test combination of version and verbosity.
[[cases]]
cli_parameters = ["--verbosity", "DEBUG", "--version"]
exit_code = 0
stdout_contains = ", version"
stderr_contains = ["Set <RootLogger root (DEBUG)> to DEBUG."]


# Test help output. Check that all subcommands and sections are listed.
[[cases]]
cli_parameters = ["--help"]
exit_code = 0
strip_ansi = true
stdout_contains = [
  "Usage: click-extra [OPTIONS] COMMAND [ARGS]...",
  "Show the version and exit.",
  "Show this message and exit.",
  "--theme",
  "Demo:",
  "8color",
  "colors",
  "gradient",
  "palette",
  "spinner",
  "styles",
  "help",
  "prebake",
  "run",
  "test-suite",
]


# -- help subcommand ----------------------------------------------------------


[[cases]]
cli_parameters = ["help", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = [
  "Usage: click-extra help",
  "Show help for a command.",
]


# -- run subcommand -----------------------------------------------------------


[[cases]]
cli_parameters = ["run", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = [
  "Usage: click-extra run [OPTIONS] SCRIPT [ARGS]...",
  "Run, or introspect, any Click CLI through Click Extra.",
]


# -- test-suite subcommand -----------------------------------------------------


[[cases]]
cli_parameters = ["test-suite", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = [
  "Usage: click-extra test-suite [OPTIONS]",
  "Run declarative CLI test cases against a command or binary.",
]


# Without a target, the required --command/--binary option errors out.
[[cases]]
cli_parameters = ["test-suite"]
exit_code = 2
strip_ansi = true
stderr_contains = """
Usage: click-extra test-suite [OPTIONS]
Try 'click-extra test-suite --help' for help.

Error: Missing option '--command' / '--binary'.
"""


# -- prebake subcommand -------------------------------------------------------


[[cases]]
cli_parameters = ["prebake", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = [
  "Usage: click-extra prebake",
  "Pre-bake build-time metadata",
]


[[cases]]
cli_parameters = ["prebake", "version", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Inject Git commit hash"]


[[cases]]
cli_parameters = ["prebake", "field", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Replace an empty dunder variable"]


[[cases]]
cli_parameters = ["prebake", "all", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Pre-bake `__version__` and all git fields"]


# -- demo subcommands ---------------------------------------------------------


[[cases]]
cli_parameters = ["colors", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Render every foreground color against every background color."]


[[cases]]
cli_parameters = ["styles", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Render every color with each text style"]


[[cases]]
cli_parameters = ["palette", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Render a compact 256-color indexed swatch."]


[[cases]]
cli_parameters = ["8color", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Render all standard 8-color"]


[[cases]]
cli_parameters = ["gradient", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = ["Render 24-bit RGB gradients"]


[[cases]]
cli_parameters = ["spinner", "--help"]
exit_code = 0
strip_ansi = true
stdout_contains = [
  "Animate the spinner widget",
  "--all",
  "--random",
  "--select",
  "--table",
]
