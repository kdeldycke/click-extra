---
name: 🚀 Build & release
"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  release:
    uses: kdeldycke/repomatic/.github/workflows/release.yaml@44d6f69616d5c0c125ce1c35c95b82f4fb6e76e1 # v6.13.0
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
