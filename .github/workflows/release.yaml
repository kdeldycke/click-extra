---
name: 🚀 Build & release
"on":
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - "renovate/**"
    paths:
      - "gha_utils/**"
      - "tests/**"
      - pyproject.toml
      - uv.lock
      - .github/workflows/release.yaml
  workflow_dispatch:

jobs:

  release:
    uses: kdeldycke/workflows/.github/workflows/release.yaml@v5.13.0
    secrets: inherit
