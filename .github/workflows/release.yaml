---
name: 🚀 Build & release
"on":
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - "renovate/**"
  workflow_dispatch:

jobs:

  release:
    uses: kdeldycke/repomatic/.github/workflows/release.yaml@v6.3.2
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      WORKFLOW_UPDATE_GITHUB_PAT: ${{ secrets.WORKFLOW_UPDATE_GITHUB_PAT }}
