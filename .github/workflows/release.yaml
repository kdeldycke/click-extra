---
name: 🚀 Build & release
"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  release:
    uses: kdeldycke/repomatic/.github/workflows/release.yaml@c8f44f78ebc03da94c3fa9345e1978df504cc7e3 # v6.12.0
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
